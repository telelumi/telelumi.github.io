<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLMenu — Nametag Manager</title>
<meta name="description" content="View and customize your Roblox nametags with TLMenu's built-in design tool.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;420;500;600;700&family=JetBrains+Mono:wght@420;520;620&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08080c;
  --surface: #0f0f15;
  --surface2: #15151d;
  --surface3: #1b1b25;
  --border: #1e1e2a;
  --border2: #2a2a38;
  --text: #d4d4de;
  --text2: #85859a;
  --text3: #54546a;
  --accent: #8888a0;
  --accent2: #a0a0b8;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
  --radius: 8px;
  --radius-sm: 5px;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  --transition: 180ms var(--ease);
}

html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.55;
  letter-spacing: -0.01em;
  min-height: 100vh;
}

/* ── Navigation ─────────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(8, 8, 12, 0.82);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
}

.nav-brand-dot {
  width: 7px; height: 7px;
  background: var(--text2);
  border-radius: 2px;
}

.nav-brand-text {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 520;
  letter-spacing: 0.04em;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 24px;
  list-style: none;
}

.nav-links a {
  font-size: 12.5px;
  font-weight: 450;
  color: var(--text2);
  text-decoration: none;
  transition: color var(--transition);
}

.nav-links a:hover, .nav-links a.active { color: var(--text); }

/* ── Layout ─────────────────────────────────────────────── */
.app-layout {
  display: flex;
  min-height: calc(100vh - 56px);
}

/* ── Sidebar ────────────────────────────────────────────── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sidebar-section {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 12px 8px 4px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text2);
  font-size: 13px;
  font-weight: 450;
  border: 1px solid transparent;
}

.sidebar-item:hover {
  background: var(--surface2);
  color: var(--text);
}

.sidebar-item.active {
  background: var(--surface2);
  border-color: var(--border2);
  color: var(--text);
}

.sidebar-item-icon {
  width: 20px; height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  opacity: 0.5;
}

.sidebar-item.active .sidebar-item-icon { opacity: 0.8; }

.sidebar-item-icon svg {
  width: 15px; height: 15px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── Main Content ───────────────────────────────────────── */
.main-content {
  flex: 1;
  padding: 28px 32px;
  overflow-y: auto;
  max-height: calc(100vh - 56px);
}

.content-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.content-title {
  font-size: 20px;
  font-weight: 650;
  letter-spacing: -0.025em;
}

.content-subtitle {
  font-size: 12.5px;
  color: var(--text2);
  margin-top: 2px;
}

/* ── Nametag Card Grid ──────────────────────────────────── */
.nametag-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.nametag-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: border-color var(--transition);
}

.nametag-card:hover { border-color: var(--border2); }

.nametag-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.nametag-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 620;
  color: var(--text2);
  flex-shrink: 0;
}

.nametag-info { flex: 1; min-width: 0; }

.nametag-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nametag-role {
  font-size: 11px;
  color: var(--text2);
  margin-top: 1px;
}

.nametag-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.nametag-badge.admin { color: #c0a060; background: rgba(192, 160, 96, 0.08); }
.nametag-badge.owner { color: #c08080; background: rgba(192, 128, 128, 0.08); }

.nametag-preview {
  width: 100%;
  height: 60px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}

.nametag-preview-tag {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 520;
  padding: 6px 14px;
  border-radius: 4px;
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #7a9e8a;
  letter-spacing: 0.03em;
}

.nametag-preview-tag.admin { color: #c0a060; border-color: rgba(192, 160, 96, 0.25); }
.nametag-preview-tag.owner { color: #c08080; border-color: rgba(192, 128, 128, 0.25); }

.nametag-actions {
  display: flex;
  gap: 8px;
}

.nametag-btn {
  flex: 1;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 520;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all var(--transition);
  text-align: center;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
}

.nametag-btn:hover {
  border-color: rgba(255, 255, 255, 0.18);
  color: var(--text);
}

.nametag-btn.primary {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

.nametag-btn.primary:hover { opacity: 0.85; }

/* ── Editor Panel ───────────────────────────────────────── */
.editor-panel {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
}

.editor-panel.open { display: flex; }

.editor-window {
  width: 520px;
  max-height: 85vh;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
}

.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 2;
}

.editor-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.editor-close {
  width: 26px; height: 26px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text3);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.editor-close:hover {
  border-color: rgba(255, 100, 100, 0.3);
  color: #d47070;
}

.editor-body { padding: 18px; display: flex; flex-direction: column; gap: 16px; }

.editor-group { display: flex; flex-direction: column; gap: 6px; }

.editor-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.editor-input, .editor-select {
  font-family: var(--mono);
  font-size: 12px;
  padding: 9px 12px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  transition: border-color var(--transition);
}

.editor-input:focus, .editor-select:focus { border-color: rgba(255, 255, 255, 0.2); }
.editor-select { cursor: pointer; }

.editor-colors {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.editor-color-swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
}

.editor-color-swatch:hover { border-color: rgba(255, 255, 255, 0.3); transform: scale(1.1); }
.editor-color-swatch.selected { border-color: #fff; }

.editor-preview-live {
  width: 100%;
  height: 80px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.editor-preview-tag {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 520;
  padding: 8px 18px;
  border-radius: 4px;
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.12);
  letter-spacing: 0.03em;
  transition: all var(--transition);
}

.editor-actions {
  display: flex;
  gap: 10px;
  padding-top: 6px;
}

.editor-btn {
  flex: 1;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 520;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all var(--transition);
  text-align: center;
}

.editor-btn.save {
  background: var(--text);
  color: var(--bg);
  border: none;
}

.editor-btn.save:hover { opacity: 0.85; }

.editor-btn.cancel {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
}

.editor-btn.cancel:hover { border-color: rgba(255, 255, 255, 0.15); color: var(--text); }

/* ── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
  font-family: var(--mono);
  font-size: 11px;
  padding: 10px 16px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.25s var(--ease);
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

/* ── Empty state ────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text3);
}

.empty-state-icon {
  font-size: 36px;
  margin-bottom: 14px;
  opacity: 0.4;
}

.empty-state-text {
  font-size: 13px;
  line-height: 1.6;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { width: 200px; }
  .nametag-grid { grid-template-columns: 1fr; }
  .editor-window { width: 90vw; }
}

@media (max-width: 600px) {
  .app-layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    flex-direction: row;
    overflow-x: auto;
    padding: 12px;
    gap: 4px;
  }
  .sidebar-section { display: none; }
  .sidebar-item { white-space: nowrap; font-size: 11px; padding: 8px 10px; }
  .main-content { padding: 20px 16px; }
}
</style>

<script>
// ── Nametag Data ──────────────────────────────────────────
const ROLES_URL = 'https://raw.githubusercontent.com/telelumi/telelumi.github.io/refs/heads/main/NametagRoles.json';

let nametags = [];
let currentFilter = 'all';
let editingIndex = -1;
let selectedNameColor = '#d4d4de';

// ── Fetch nametags ────────────────────────────────────────
async function loadNametags() {
  try {
    const resp = await fetch(ROLES_URL);
    if (!resp.ok) throw new Error('Failed to fetch');
    const text = await resp.text();
    parseNametags(text);
  } catch (e) {
    console.warn('Could not load from GitHub, using localStorage fallback');
    loadFromLocalStorage();
  }
}

function parseNametags(text) {
  nametags = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const match = line.match(/\["([^"]+)"\]\s*=\s*\{\s*display\s*=\s*"([^"]+)"\s*,\s*role\s*=\s*"([^"]+)"\s*\}/);
    if (match) {
      nametags.push({
        id: match[1],
        display: match[2],
        role: match[3],
        color: getDefaultColor(match[3])
      });
    }
  }
  if (nametags.length === 0) loadFromLocalStorage();
  else {
    saveToLocalStorage();
    renderNametags();
  }
}

function getDefaultColor(role) {
  const r = role.toLowerCase();
  if (r.includes('owner')) return '#c08080';
  if (r.includes('admin')) return '#c0a060';
  if (r.includes('dev')) return '#8ab4d8';
  if (r.includes('mod')) return '#7a9e8a';
  return '#d4d4de';
}

function loadFromLocalStorage() {
  const stored = localStorage.getItem('tlmenu_nametags');
  if (stored) {
    try { nametags = JSON.parse(stored); } catch { nametags = getDefaultNametags(); }
  } else {
    nametags = getDefaultNametags();
  }
  if (nametags.length === 0) nametags = getDefaultNametags();
  saveToLocalStorage();
  renderNametags();
}

function saveToLocalStorage() {
  localStorage.setItem('tlmenu_nametags', JSON.stringify(nametags));
}

function getDefaultNametags() {
  return [
    { id: '3242332433', display: 'TL Owner', role: 'Administrator', color: '#c08080' },
    { id: 'you2iubdfisub', display: 'TL Admin', role: 'Administrator', color: '#c0a060' },
    { id: 'DevMaster', display: 'TL Developer', role: 'Developer', color: '#8ab4d8' },
    { id: 'ModHelper', display: 'TL Moderator', role: 'Moderator', color: '#7a9e8a' },
  ];
}

// ── Render ────────────────────────────────────────────────
function renderNametags() {
  const grid = document.getElementById('nametagGrid');
  let filtered = nametags;

  if (currentFilter === 'admins') {
    filtered = nametags.filter(n => n.role.toLowerCase().includes('admin'));
  } else if (currentFilter === 'owner') {
    filtered = nametags.filter(n => n.role.toLowerCase().includes('owner'));
  } else if (currentFilter === 'devs') {
    filtered = nametags.filter(n => n.role.toLowerCase().includes('dev'));
  } else if (currentFilter === 'mods') {
    filtered = nametags.filter(n => n.role.toLowerCase().includes('mod'));
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <div class="empty-state-icon">🏷️</div>
      <div class="empty-state-text">No nametags found for this filter.<br>Click "Add New" to create one.</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map((n, i) => {
    const originalIndex = nametags.indexOf(n);
    const isAdmin = n.role.toLowerCase().includes('admin');
    const isOwner = n.role.toLowerCase().includes('owner');
    const badgeClass = isOwner ? 'owner' : (isAdmin ? 'admin' : '');
    const previewClass = isOwner ? 'owner' : (isAdmin ? 'admin' : '');

    return `
      <div class="nametag-card">
        <div class="nametag-card-header">
          <div class="nametag-avatar">${(n.display || n.id).charAt(0).toUpperCase()}</div>
          <div class="nametag-info">
            <div class="nametag-name">${n.display || n.id}</div>
            <div class="nametag-role">@${n.id} · ${n.role}</div>
          </div>
          <span class="nametag-badge ${badgeClass}">${n.role}</span>
        </div>
        <div class="nametag-preview">
          <div class="nametag-preview-tag ${previewClass}" style="color:${n.color || '#d4d4de'};border-color:${n.color || '#d4d4de'}33;">
            ${n.display || n.id} · ${n.role}
          </div>
        </div>
        <div class="nametag-actions">
          <button class="nametag-btn" onclick="editNametag(${originalIndex})">Edit</button>
          <button class="nametag-btn" onclick="copyNametagCode(${originalIndex})">Copy</button>
          <button class="nametag-btn" onclick="deleteNametag(${originalIndex})" style="color:#c06060;">Delete</button>
        </div>
      </div>
    `;
  }).join('');
}

// ── Editor ────────────────────────────────────────────────
function editNametag(index) {
  editingIndex = index;
  const n = nametags[index];
  document.getElementById('editUser').value = n.id;
  document.getElementById('editDisplay').value = n.display;
  document.getElementById('editRole').value = n.role;
  selectedNameColor = n.color || '#d4d4de';
  updateColorSwatches();
  updateLivePreview();
  document.getElementById('editorPanel').classList.add('open');
}

function updateColorSwatches() {
  document.querySelectorAll('#nameColors .editor-color-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === selectedNameColor);
  });
}

function updateLivePreview() {
  const display = document.getElementById('editDisplay').value || 'Preview';
  const role = document.getElementById('editRole').value;
  const tag = document.getElementById('editorPreviewTag');
  tag.textContent = display + ' · ' + role;
  tag.style.color = selectedNameColor;
  tag.style.borderColor = selectedNameColor + '33';
}

document.getElementById('editDisplay').addEventListener('input', updateLivePreview);
document.getElementById('editRole').addEventListener('change', updateLivePreview);

document.querySelectorAll('#nameColors .editor-color-swatch').forEach(s => {
  s.addEventListener('click', () => {
    selectedNameColor = s.dataset.color;
    updateColorSwatches();
    updateLivePreview();
  });
});

document.getElementById('editorCancel').addEventListener('click', () => {
  document.getElementById('editorPanel').classList.remove('open');
  editingIndex = -1;
});

document.getElementById('editorClose').addEventListener('click', () => {
  document.getElementById('editorPanel').classList.remove('open');
  editingIndex = -1;
});

document.getElementById('editorSave').addEventListener('click', () => {
  if (editingIndex < 0 || editingIndex >= nametags.length) return;
  nametags[editingIndex].display = document.getElementById('editDisplay').value.trim() || nametags[editingIndex].display;
  nametags[editingIndex].role = document.getElementById('editRole').value;
  nametags[editingIndex].color = selectedNameColor;
  saveToLocalStorage();
  renderNametags();
  document.getElementById('editorPanel').classList.remove('open');
  editingIndex = -1;
  showToast('Nametag updated ✓');
});

// ── Add New ───────────────────────────────────────────────
document.getElementById('addNewBtn').addEventListener('click', () => {
  nametags.push({
    id: 'NewUser',
    display: 'New User',
    role: 'TL USER',
    color: '#d4d4de'
  });
  saveToLocalStorage();
  renderNametags();
  editNametag(nametags.length - 1);
  showToast('New nametag created ✓');
});

// ── Delete ────────────────────────────────────────────────
function deleteNametag(index) {
  if (confirm('Delete nametag for ' + nametags[index].display + '?')) {
    nametags.splice(index, 1);
    saveToLocalStorage();
    renderNametags();
    showToast('Nametag deleted');
  }
}

// ── Copy Code ─────────────────────────────────────────────
function copyNametagCode(index) {
  const n = nametags[index];
  const code = `["${n.id}"] = { display = "${n.display}", role = "${n.role}" },`;
  navigator.clipboard.writeText(code).then(() => showToast('Code copied to clipboard ✓'));
}

// ── Sidebar Navigation ────────────────────────────────────
document.querySelectorAll('.sidebar-item[data-view]').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentFilter = item.dataset.view;
    renderNametags();
  });
});

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────
loadNametags();
</script>
</body>
</html>
