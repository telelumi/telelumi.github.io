<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLMenu — Audio Loader</title>
<meta name="description" content="Convert MP3 URLs to Roblox-compatible loadstring audio snippets.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;420;500;600;700&family=JetBrains+Mono:wght@420;520;620&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08080c;
  --surface: #0f0f15;
  --surface2: #15151d;
  --surface3: #1b1b25;
  --border: #1e1e2a;
  --border2: #2a2a38;
  --text: #d4d4de;
  --text2: #85859a;
  --text3: #54546a;
  --accent: #6a8a7a;
  --accent2: #7a9e8a;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
  --radius: 8px;
  --radius-sm: 5px;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  --transition: 180ms var(--ease);
}

html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.55;
  letter-spacing: -0.01em;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Navigation ─────────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: rgba(8, 8, 12, 0.82);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
}

.nav-brand-dot { width: 7px; height: 7px; background: var(--text2); border-radius: 2px; }

.nav-brand-text {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 520;
  letter-spacing: 0.04em;
}

.nav-links { display: flex; align-items: center; gap: 24px; list-style: none; }

.nav-links a {
  font-size: 12.5px;
  font-weight: 450;
  color: var(--text2);
  text-decoration: none;
  transition: color var(--transition);
}

.nav-links a:hover, .nav-links a.active { color: var(--text); }

/* ── Main ───────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  padding: 48px 24px;
}

.wrapper {
  width: 100%;
  max-width: 680px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

/* ── Card ───────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 28px 32px;
}

.card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.card:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.card:only-child { border-radius: var(--radius); }
.card + .card { border-top: none; }

.card-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.card-title {
  font-size: 20px;
  font-weight: 650;
  letter-spacing: -0.025em;
  margin-bottom: 4px;
}

.card-sub {
  font-size: 12.5px;
  color: var(--text2);
  margin-bottom: 22px;
}

/* ── Input ──────────────────────────────────────────────── */
.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.input-field {
  flex: 1;
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  outline: none;
  transition: border-color var(--transition);
}

.input-field::placeholder { color: var(--text3); }
.input-field:focus { border-color: rgba(255, 255, 255, 0.2); }

.btn {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 520;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all var(--transition);
  white-space: nowrap;
  border: none;
}

.btn-primary {
  background: var(--text);
  color: var(--bg);
}

.btn-primary:hover { opacity: 0.85; }

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
}

.btn-ghost:hover { border-color: rgba(255, 255, 255, 0.15); color: var(--text); }

/* ── Audio Player ───────────────────────────────────────── */
.audio-preview {
  display: none;
  margin-bottom: 16px;
  padding: 14px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}

.audio-preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.audio-preview-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 400px;
}

.audio-preview-close {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  transition: color var(--transition);
}

.audio-preview-close:hover { color: #c06060; }

.audio-player {
  width: 100%;
  height: 32px;
  border-radius: var(--radius-sm);
}

.audio-player::-webkit-media-controls-panel {
  background: var(--surface3);
}

.audio-player::-webkit-media-controls-current-time-display,
.audio-player::-webkit-media-controls-time-remaining-display {
  color: var(--text2);
  font-family: var(--mono);
  font-size: 10px;
}

/* ── Code Output ────────────────────────────────────────── */
.code-output {
  display: none;
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.code-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.code-block {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  font-family: var(--mono);
  font-size: 11.5px;
  line-height: 1.9;
  color: var(--text2);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
  position: relative;
}

.code-block .kw { color: var(--accent2); font-weight: 520; }
.code-block .str { color: #7a9e8a; }
.code-block .fn { color: #c0a060; }
.code-block .comment { color: var(--text3); }

/* ── Method Selector ────────────────────────────────────── */
.method-tabs {
  display: flex;
  gap: 1px;
  margin-bottom: 16px;
  background: var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.method-tab {
  flex: 1;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 520;
  padding: 9px 12px;
  background: var(--surface2);
  color: var(--text3);
  border: none;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all var(--transition);
  text-align: center;
}

.method-tab.active {
  background: var(--surface3);
  color: var(--text);
}

.method-tab:hover:not(.active) { color: var(--text2); }

/* ── History ────────────────────────────────────────────── */
.history-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  max-height: 200px;
  overflow-y: auto;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}

.history-item-icon {
  opacity: 0.4;
  flex-shrink: 0;
  font-size: 16px;
}

.history-item-url {
  flex: 1;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-item-actions {
  display: flex;
  gap: 6px;
}

.history-btn {
  font-family: var(--mono);
  font-size: 9.5px;
  padding: 4px 10px;
  border-radius: 4px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text3);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.history-btn:hover { border-color: rgba(255, 255, 255, 0.15); color: var(--text); }

/* ── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
  font-family: var(--mono);
  font-size: 11px;
  padding: 10px 16px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.25s var(--ease);
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

/* ── Footer ─────────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-text { font-size: 11px; color: var(--text3); }
.footer-brand { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.04em; }

@media (max-width: 600px) {
  .card { padding: 20px 16px; }
  .input-group { flex-direction: column; }
  .method-tabs { flex-wrap: wrap; }
}
</style>
</head>
<body>

<nav>
  <a href="../" class="nav-brand">
    <span class="nav-brand-dot"></span>
    <span class="nav-brand-text">TLMenu</span>
  </a>
  <ul class="nav-links">
    <li><a href="../">Home</a></li>
    <li><a href="upload.html">Uploader</a></li>
    <li><a href="nametags.html">Nametags</a></li>
    <li><a href="audio.html" class="active">Audio</a></li>
  </ul>
</nav>

<div class="main">
  <div class="wrapper">

    <!-- Input Card -->
    <div class="card">
      <div class="card-label">Audio Loader</div>
      <div class="card-title">MP3 to Script</div>
      <div class="card-sub">Paste an MP3 URL and get a ready-to-use Roblox loadstring.</div>

      <div class="method-tabs" id="methodTabs">
        <button class="method-tab active" data-method="sound">Sound Object</button>
        <button class="method-tab" data-method="loadstring">Loadstring</button>
        <button class="method-tab" data-method="custom">Custom Script</button>
      </div>

      <div class="input-group">
        <input type="text" class="input-field" id="urlInput" placeholder="https://example.com/audio.mp3" autocomplete="off" spellcheck="false" />
        <button class="btn btn-primary" id="generateBtn">Generate</button>
      </div>

      <!-- Audio Preview -->
      <div class="audio-preview" id="audioPreview">
        <div class="audio-preview-header">
          <span class="audio-preview-title" id="audioTitle">Audio Preview</span>
          <button class="audio-preview-close" id="audioClose">✕</button>
        </div>
        <audio class="audio-player" id="audioPlayer" controls preload="metadata">
          Your browser does not support the audio element.
        </audio>
      </div>

      <!-- Code Output -->
      <div class="code-output" id="codeOutput">
        <div class="code-header">
          <span class="code-label">Generated Script</span>
          <button class="btn btn-ghost" id="copyBtn">Copy</button>
        </div>
        <div class="code-block" id="codeBlock"></div>
      </div>
    </div>

    <!-- History Card -->
    <div class="card" id="historyCard" style="display:none;">
      <div class="card-label">Recent</div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>
</div>

<footer>
  <span class="footer-text">TLMenu Audio Loader</span>
  <span class="footer-brand">TLMenu</span>
</footer>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────
let currentMethod = 'sound';
let currentUrl = '';

// ── DOM Refs ──────────────────────────────────────────────
const methodTabs    = document.getElementById('methodTabs');
const urlInput      = document.getElementById('urlInput');
const generateBtn   = document.getElementById('generateBtn');
const audioPreview  = document.getElementById('audioPreview');
const audioTitle    = document.getElementById('audioTitle');
const audioPlayer   = document.getElementById('audioPlayer');
const audioClose    = document.getElementById('audioClose');
const codeOutput    = document.getElementById('codeOutput');
const codeBlock     = document.getElementById('codeBlock');
const copyBtn       = document.getElementById('copyBtn');
const historyCard   = document.getElementById('historyCard');
const historyList   = document.getElementById('historyList');
const toast         = document.getElementById('toast');

// ── Methods ───────────────────────────────────────────────
methodTabs.addEventListener('click', e => {
  if (e.target.classList.contains('method-tab')) {
    document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentMethod = e.target.dataset.method;
    if (currentUrl) generateCode(currentUrl);
  }
});

// ── Generate ──────────────────────────────────────────────
function isValidAudioUrl(url) {
  return /^https?:\/\/.+\.(mp3|wav|ogg|flac|m4a|aac|wma|opus)(\?.*)?$/i.test(url) ||
         /^rbxassetid:\/\/\d+$/i.test(url);
}

function extractFileName(url) {
  try {
    const path = new URL(url).pathname;
    const name = path.split('/').pop() || 'audio';
    return decodeURIComponent(name).replace(/\.\w+$/, '');
  } catch {
    const match = url.match(/([^/]+)\.\w+(\?|$)/);
    return match ? match[1] : 'audio';
  }
}

function escapeString(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function generateCode(url) {
  currentUrl = url;
  const fileName = extractFileName(url);
  const escapedUrl = escapeString(url);

  let code = '';

  switch (currentMethod) {
    case 'sound':
      code = `-- Play audio: ${fileName}
local Sound = Instance.new("Sound")
Sound.SoundId = "${escapedUrl}"
Sound.Volume = 1
Sound.Parent = game:GetService("Workspace") -- or game.Players.LocalPlayer.PlayerGui
Sound:Play()

-- Optional: Destroy after playback
Sound.Ended:Connect(function()
    Sound:Destroy()
end)`;
      break;

    case 'loadstring':
      code = `-- Audio Loadstring for ${fileName}
-- Paste this into your executor:

loadstring(game:HttpGet("${escapedUrl}"))();

-- Or for direct sound loading:
local s = Instance.new("Sound", workspace)
s.SoundId = "${escapedUrl}"
s.Volume = 0.5
s.Looped = true
s:Play()`;
      break;

    case 'custom':
      code = `-- Custom Audio Script: ${fileName}
-- Configure below:

local AUDIO_URL = "${escapedUrl}"
local VOLUME = 0.5
local LOOPED = false
local PARENT = game:GetService("Workspace")

-- Create and play
local Sound = Instance.new("Sound")
Sound.SoundId = AUDIO_URL
Sound.Volume = VOLUME
Sound.Looped = LOOPED
Sound.Parent = PARENT

Sound.Loaded:Connect(function()
    print("[TLMenu] Loaded: ${fileName}")
    Sound:Play()
end)

Sound.Ended:Connect(function()
    if not LOOPED then
        print("[TLMenu] Finished: ${fileName}")
        Sound:Destroy()
    end
end)

-- Controls (uncomment to use):
-- Sound:Pause()
-- Sound:Resume()
-- Sound:Stop()
-- Sound:Destroy()`;
      break;
  }

  codeBlock.innerHTML = syntaxHighlight(code);
  codeOutput.style.display = 'block';
  updateAudioPreview(url, fileName);
  saveToHistory(url, fileName);
  renderHistory();
}

function syntaxHighlight(code) {
  return code
    .replace(/--.*$/gm, match => `<span class="comment">${match}</span>`)
    .replace(/("(?:[^"\\]|\\.)*")/g, '<span class="str">$1</span>')
    .replace(/('(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>')
    .replace(/\b(local|function|end|if|then|else|elseif|for|while|do|return|break|nil|true|false|and|or|not)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(game|workspace|Instance|Sound|Vector3|CFrame|UDim2|Color3|Enum|math|string|table|print|wait|task|pcall|tostring|tonumber)\b/g, '<span class="fn">$1</span>');
}

// ── Audio Preview ─────────────────────────────────────────
function updateAudioPreview(url, name) {
  audioTitle.textContent = name;
  audioPlayer.src = url;
  audioPreview.style.display = 'block';
}

audioClose.addEventListener('click', () => {
  audioPlayer.pause();
  audioPlayer.src = '';
  audioPreview.style.display = 'none';
});

// ── Copy ──────────────────────────────────────────────────
copyBtn.addEventListener('click', () => {
  const rawCode = codeBlock.textContent;
  navigator.clipboard.writeText(rawCode).then(() => showToast('Copied to clipboard ✓'));
});

// ── Generate Button ───────────────────────────────────────
generateBtn.addEventListener('click', () => {
  const url = urlInput.value.trim();
  if (!url) { showToast('Please enter a URL'); return; }
  if (!isValidAudioUrl(url)) {
    // Try anyway — might be a direct link without extension
    if (url.startsWith('http')) {
      generateCode(url);
      return;
    }
    showToast('Invalid URL format');
    return;
  }
  generateCode(url);
});

// Enter key
urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') generateBtn.click();
});

// ── History ───────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem('tlmenu_audio_history') || '[]'); }
  catch { return []; }
}

function saveToHistory(url, name) {
  const h = getHistory();
  // Remove duplicates
  const filtered = h.filter(item => item.url !== url);
  filtered.unshift({ url, name, ts: Date.now() });
  localStorage.setItem('tlmenu_audio_history', JSON.stringify(filtered.slice(0, 15)));
}

function renderHistory() {
  const h = getHistory();
  if (!h.length) { historyCard.style.display = 'none'; return; }
  historyCard.style.display = 'block';

  historyList.innerHTML = h.map((item, i) => `
    <div class="history-item">
      <span class="history-item-icon">🎵</span>
      <span class="history-item-url" title="${item.url}">${item.name}</span>
      <div class="history-item-actions">
        <button class="history-btn" onclick="loadHistoryItem(${i})">Load</button>
        <button class="history-btn" onclick="removeHistoryItem(${i})" style="color:#c06060;">✕</button>
      </div>
    </div>
  `).join('');
}

function loadHistoryItem(index) {
  const h = getHistory();
  if (h[index]) {
    urlInput.value = h[index].url;
    generateCode(h[index].url);
  }
}

function removeHistoryItem(index) {
  const h = getHistory();
  h.splice(index, 1);
  localStorage.setItem('tlmenu_audio_history', JSON.stringify(h));
  renderHistory();
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────
renderHistory();
</script>
</body>
</html>
