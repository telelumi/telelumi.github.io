<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLMenu - Nametag Uploader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;600;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04030d;
  --bg2:#080618;
  --surface:#0d0b1e;
  --border:#2a1f5e;
  --border2:#4a3a8a;
  --accent:#7c5cfc;
  --accent2:#c084fc;
  --accent3:#38bdf8;
  --gold:#f59e0b;
  --text:#e8e4ff;
  --muted:#6b5f9e;
  --mono:'Space Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --display:'Montserrat',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;cursor:none;min-height:100vh;display:flex;flex-direction:column}
a,button,label{cursor:none}

/* CUSTOM CURSOR */
#cursor{position:fixed;top:0;left:0;will-change:transform;width:12px;height:12px;background:var(--accent2);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width 0.15s,height 0.15s,background 0.15s;mix-blend-mode:screen}
#cursor-ring{position:fixed;top:0;left:0;will-change:transform;width:36px;height:36px;border:1px solid var(--accent);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width 0.12s,height 0.12s,border-color 0.12s;mix-blend-mode:screen}
#cursor.clicking{width:6px;height:6px;background:var(--gold)}
#cursor-ring.clicking{width:50px;height:50px;border-color:var(--gold)}
#cursor.hovering{width:18px;height:18px;background:var(--accent3)}
#cursor-ring.hovering{width:52px;height:52px;border-color:var(--accent3)}

#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.2rem 3rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(4,3,13,0.85);backdrop-filter:blur(20px)}
.nav-logo{font-family:var(--mono);font-size:1.1rem;letter-spacing:0.1em;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:0.78rem;text-decoration:none;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;font-family:var(--mono)}
.nav-links a:hover{color:var(--accent2)}
.nav-cta{font-family:var(--mono);font-size:0.7rem;padding:0.55rem 1.4rem;border:1px solid var(--accent);background:transparent;color:var(--accent2);letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;position:relative;overflow:hidden}
.nav-cta:hover{border-color:var(--accent2);box-shadow:0 0 20px rgba(124,92,252,0.4);color:var(--text)}

/* MAIN CONTENT */
.upload-container{flex:1;display:flex;align-items:center;justify-content:center;padding:8rem 2rem 4rem;position:relative;z-index:10}
.upload-box{background:var(--surface);border:1px solid var(--border);padding:3rem;max-width:600px;width:100%;text-align:center;position:relative;box-shadow:0 0 40px rgba(124,92,252,0.1);transition:border-color 0.3s}
.upload-box:hover{border-color:var(--border2)}
.upload-box::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:700px;height:350px;background:radial-gradient(ellipse,rgba(124,92,252,0.06),transparent);pointer-events:none;z-index:-1}

.upload-header{font-family:var(--display);font-size:2.2rem;font-weight:900;margin-bottom:0.5rem;color:var(--text)}
.upload-sub{font-size:0.85rem;color:var(--muted);font-family:var(--mono);margin-bottom:2.5rem;letter-spacing:0.05em}

.file-input-wrapper{margin-bottom:2rem;position:relative}
.file-input{width:0.1px;height:0.1px;opacity:0;overflow:hidden;position:absolute;z-index:-1}
.file-label{display:inline-flex;align-items:center;justify-content:center;gap:1rem;font-family:var(--mono);font-size:0.8rem;padding:1.2rem 2.5rem;background:rgba(124,92,252,0.08);color:var(--accent2);border:1px dashed var(--border2);letter-spacing:0.1em;text-transform:uppercase;transition:all 0.3s;width:100%}
.file-label:hover{background:rgba(124,92,252,0.15);border-color:var(--accent);color:var(--text);box-shadow:0 0 20px rgba(124,92,252,0.2)}
.file-label svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.5}

.selected-file{font-family:var(--mono);font-size:0.75rem;color:var(--text);margin-bottom:2rem;background:rgba(0,0,0,0.3);padding:0.8rem;border-radius:4px;border:1px solid var(--border);display:none;word-break:break-all}

.btn-primary{font-family:var(--mono);font-size:0.8rem;padding:1rem 2.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.3s;width:100%;display:none;align-items:center;justify-content:center;gap:0.8rem}
.btn-primary:hover{box-shadow:0 0 35px rgba(192,132,252,0.55);transform:translateY(-2px)}
.btn-primary:disabled{opacity:0.6;transform:none;box-shadow:none;pointer-events:none}

/* LOADER */
.loader{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULT */
.result-container{margin-top:2rem;display:none;text-align:left}
.result-label{font-family:var(--mono);font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem}
.result-url{font-family:var(--mono);font-size:0.75rem;padding:1rem;background:rgba(0,0,0,0.4);border:1px solid var(--border);color:var(--accent3);word-break:break-all;user-select:all}
.copy-btn{font-family:var(--mono);font-size:0.7rem;padding:0.7rem;background:var(--border2);color:#fff;border:none;margin-top:0.8rem;width:100%;transition:background 0.2s;text-transform:uppercase;letter-spacing:0.1em}
.copy-btn:hover{background:var(--accent)}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:2rem 3rem;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;background:var(--bg)}
.footer-logo{font-family:var(--mono);font-size:0.9rem;font-weight:700;letter-spacing:0.1em;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.footer-copy{font-size:0.68rem;color:var(--muted);font-family:var(--mono);letter-spacing:0.06em}

@media(max-width:768px){
  nav{padding:1rem 1.5rem}
  .nav-links{display:none}
  footer{flex-direction:column;gap:1rem;text-align:center}
  .upload-box{padding:2rem}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="stars-canvas"></canvas>

<nav>
  <a href="../" class="nav-logo">TLMenu</a>
  <ul class="nav-links">
    <li><a href="../#features">Features</a></li>
    <li><a href="../#preview">Preview</a></li>
  </ul>
  <a href="https://raw.githubusercontent.com/telelumi/TLMenu/refs/heads/main/TLMenuBETA.lua" target="_blank" class="nav-cta">Get Script</a>
</nav>

<div class="upload-container">
  <div class="upload-box">
    <h1 class="upload-header">Nametag Uploader</h1>
    <p class="upload-sub">Upload your .mp4 video to get a direct link for Roblox.</p>

    <div class="file-input-wrapper">
      <input type="file" id="file" class="file-input" accept="video/mp4" />
      <label for="file" class="file-label">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Select MP4 File</span>
      </label>
    </div>

    <div class="selected-file" id="fileName">No file selected</div>
    
    <button id="uploadBtn" class="btn-primary">
      <span id="btnText">Upload to Catbox</span>
      <div class="loader" id="loader"></div>
    </button>

    <div class="result-container" id="resultContainer">
      <div class="result-label">Direct URL (Copy this to Roblox):</div>
      <div class="result-url" id="resultUrl"></div>
      <button class="copy-btn" id="copyBtn">Copy Link</button>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">TLMenu</div>
  <div class="footer-copy">© 2026 TLMenu</div>
</footer>

<script>
// CUSTOM CURSOR
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  cursor.style.transform='translate(calc('+mx+'px - 50%), calc('+my+'px - 50%))';
},{ passive: true });
function animRing(){
  rx+=(mx-rx)*0.22;
  ry+=(my-ry)*0.22;
  ring.style.transform='translate(calc('+rx+'px - 50%), calc('+ry+'px - 50%))';
  requestAnimationFrame(animRing);
}
animRing();
document.addEventListener('mousedown',()=>{cursor.classList.add('clicking');ring.classList.add('clicking')});
document.addEventListener('mouseup',()=>{cursor.classList.remove('clicking');ring.classList.remove('clicking')});
document.querySelectorAll('a,button,.file-label,.nav-cta').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cursor.classList.add('hovering');ring.classList.add('hovering')});
  el.addEventListener('mouseleave',()=>{cursor.classList.remove('hovering');ring.classList.remove('hovering')});
});

// STARFIELD
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let W,H,stars=[];
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',()=>{resize();initStars()});
function initStars(){
  stars=[];
  const n=Math.floor(W*H/3800);
  for(let i=0;i<n;i++){
    stars.push({
      x:Math.random()*W,
      y:Math.random()*H,
      r:Math.random()*1.5+0.2,
      a:Math.random()*0.8+0.1,
      speed:Math.random()*0.4+0.05,
      twinkle:Math.random()*Math.PI*2,
      type:Math.floor(Math.random()*3)
    });
  }
}
initStars();
function drawStars(){
  ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{
    s.twinkle+=s.speed*0.035;
    const alpha=s.a*(0.4+0.6*Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    if(s.type===0) ctx.fillStyle=`rgba(192,132,252,${alpha})`;
    else if(s.type===1) ctx.fillStyle=`rgba(56,189,248,${alpha})`;
    else ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// UPLOADER LOGIC
const fileInput = document.getElementById('file');
const fileNameDisplay = document.getElementById('fileName');
const uploadBtn = document.getElementById('uploadBtn');
const btnText = document.getElementById('btnText');
const loader = document.getElementById('loader');
const resultContainer = document.getElementById('resultContainer');
const resultUrl = document.getElementById('resultUrl');
const copyBtn = document.getElementById('copyBtn');

let selectedFile = null;

fileInput.addEventListener('change', (e) => {
  if (e.target.files && e.target.files.length > 0) {
    selectedFile = e.target.files[0];
    if(selectedFile.type !== "video/mp4" && !selectedFile.name.endsWith('.mp4')){
       alert("Please select a valid .mp4 file!");
       fileInput.value = "";
       selectedFile = null;
       fileNameDisplay.style.display = 'none';
       uploadBtn.style.display = 'none';
       return;
    }
    fileNameDisplay.textContent = selectedFile.name + ` (${(selectedFile.size / (1024*1024)).toFixed(2)} MB)`;
    fileNameDisplay.style.display = 'block';
    uploadBtn.style.display = 'flex';
    resultContainer.style.display = 'none';
  }
});

uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  // UI state
  uploadBtn.disabled = true;
  btnText.textContent = 'Uploading...';
  loader.style.display = 'block';

  const formData = new FormData();
  formData.append('reqtype', 'fileupload');
  formData.append('fileToUpload', selectedFile);

  try {
    const response = await fetch('https://catbox.moe/user/api.php', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      throw new Error(`HTTP Error: ${response.status}`);
    }

    const url = await response.text();
    
    // UI result
    resultUrl.textContent = url;
    resultContainer.style.display = 'block';
    btnText.textContent = 'Upload Complete';

  } catch (err) {
    alert('Upload failed: ' + err.message + '\n\nTry uploading a smaller file or check your connection.');
    btnText.textContent = 'Retry Upload';
  } finally {
    uploadBtn.disabled = false;
    loader.style.display = 'none';
  }
});

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(resultUrl.textContent).then(() => {
    const oldText = copyBtn.textContent;
    copyBtn.textContent = 'Copied!';
    copyBtn.style.background = 'var(--accent3)';
    copyBtn.style.color = '#000';
    setTimeout(() => {
      copyBtn.textContent = oldText;
      copyBtn.style.background = 'var(--border2)';
      copyBtn.style.color = '#fff';
    }, 2000);
  });
});
</script>
</body>
</html>
